name: Release

# Push a version tag (e.g. v0.6.0) to build the Windows installer and publish
# a GitHub Release with it attached:
#   git tag v0.6.0 && git push origin v0.6.0
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests (release gate)
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[rapidocr,dev]"
          python -m pytest -q -p no:cacheprovider

      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $ver = (python -c "from pdf_ocrer import __version__; print(__version__)").Trim()
          if ($tag -ne $ver) {
            throw "Tag $tag does not match pdf_ocrer.__version__ ($ver). Bump src/pdf_ocrer/__init__.py before tagging."
          }
          Write-Host "Version check OK: $ver"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: pwsh packaging/build.ps1

      - name: Smoke-test frozen CLI (offline OCR from an arbitrary folder)
        shell: pwsh
        run: |
          $work = New-Item -ItemType Directory -Force -Path "$env:TEMP\pdfocr_smoke"
          python -c "import sys; sys.path.insert(0, 'tests'); import fixtures_gen; from pathlib import Path; fixtures_gen.build_scanned(Path(r'$work') / 'scan.pdf')"
          $exe = Join-Path $env:GITHUB_WORKSPACE "packaging\dist\pdf_ocrer\pdf-ocrer.exe"
          # Launch from a folder that is NOT the app/install dir: proves config
          # resolution is CWD-independent and the frozen app bootstraps its config.
          Push-Location $work
          try { & $exe $work --no-llm } finally { Pop-Location }
          $out = Join-Path $work "OCR輸出"
          if (-not (Test-Path $out)) { throw "frozen CLI produced no output dir" }
          if (-not (Get-ChildItem $out -Filter "*_OCR.pdf")) { throw "frozen CLI produced no searchable PDF" }
          # Parallel path: exercises multiprocessing spawn in the frozen build,
          # which requires freeze_support() in the entry point.
          $work2 = New-Item -ItemType Directory -Force -Path "$env:TEMP\pdfocr_smoke2"
          python -c "import sys; sys.path.insert(0, 'tests'); import fixtures_gen; from pathlib import Path; d = Path(r'$work2'); [fixtures_gen.build_scanned(d / f'scan{i}.pdf') for i in range(3)]"
          Push-Location $work2
          try { & $exe $work2 --no-llm --workers 2 --force } finally { Pop-Location }
          if ((Get-ChildItem (Join-Path $work2 "OCR輸出") -Filter "*_OCR.pdf").Count -lt 3) {
            throw "frozen parallel run did not produce all outputs"
          }
          Write-Host "Frozen CLI offline + parallel smoke tests passed"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/Output/pdf-ocrer-setup-*.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
